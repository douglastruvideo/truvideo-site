name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dist/
        run: |
          mkdir -p dist
          find . \
            -not -path './.git*' \
            -not -path './.github*' \
            -not -path './dist*' \
            -not -name '.gitignore' \
            | while read f; do
              dest="dist/$f"
              mkdir -p "$(dirname "$dest")"
              cp -r "$f" "$dest" 2>/dev/null || true
            done

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
